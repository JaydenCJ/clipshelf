  <circle cx="38" cy="15" r="5" fill="#febc2e"/>
  <circle cx="56" cy="15" r="5" fill="#28c840"/>
  <text x="360" y="19" fill="#8b93a7" text-anchor="middle" font-size="12">clipshelf — Kindle clippings to Markdown</text>

  <text x="20" y="56" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> clipshelf export "My Clippings.txt" -o notes</text>
  <text x="20" y="78" fill="#c8ceda">wrote notes/how-to-read-a-book.md <tspan fill="#8b93a7">(2 highlights, 1 note, 2 duplicates removed)</tspan></text>
  <text x="20" y="96" fill="#c8ceda">wrote notes/meditations.md <tspan fill="#8b93a7">(2 highlights, 1 duplicate removed)</tspan></text>
  <text x="20" y="114" fill="#c8ceda">wrote notes/cien-años-de-soledad.md <tspan fill="#8b93a7">(1 highlight)</tspan></text>
  <text x="20" y="132" fill="#c8ceda">wrote notes/こころ.md <tspan fill="#8b93a7">(1 highlight)</tspan></text>
  <text x="20" y="150" fill="#98c379">4 books, 6 highlights, 1 note, 3 duplicates removed</text>

  <text x="20" y="182" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> head notes/how-to-read-a-book.md</text>
  <text x="20" y="204" fill="#61afef"># How to Read a Book</text>
  <text x="20" y="222" fill="#c8ceda">*Mortimer J. Adler*</text>
  <text x="20" y="240" fill="#c8ceda">2 highlights · 1 note <tspan fill="#8b93a7">(2 duplicates removed)</tspan></text>
  <text x="20" y="258" fill="#61afef">## Highlights</text>
  <text x="20" y="280" fill="#c8ceda">&gt; Reading a book should be a conversation between you and</text>
  <text x="20" y="298" fill="#c8ceda">&gt; the author. Presumably he knows more about the subject…</text>
  <text x="20" y="318" fill="#8b93a7">location 351-354 · page 23 · 2024-03-05 21:13</text>
  <text x="20" y="338" fill="#c8ceda"><tspan fill="#e5c07b">**Note:**</tspan> The core idea: reading is active, not passive.</text>

  <text x="20" y="370" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> clipshelf stats "My Clippings.txt" <tspan fill="#5c6370"># three revisions collapsed</tspan></text>
  <text x="20" y="392" fill="#c8ceda">duplicates removed  <tspan fill="#e06c75">3</tspan></text>
